# ============================================================================
# Project: Twilio SMS Service (Multi-Broker Support)
# Description: Bridge between messaging brokers (Kafka/RabbitMQ) and Twilio.
#              This service can consume from either source to send SMS.
# ============================================================================


# ===================================================================
# Server Configuration
# ===================================================================
server:
  port: 8444


# ===================================================================
# Eureka Discovery Client Settings
# ===================================================================
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
    enabled: true


# ===================================================================
# Spring Core & Application Identity
# ===================================================================
spring:
  application:
    name: TwilloSms

  # ===================================================================
  # Messaging: Kafka Configuration used when the system is running in Kafka mode.
  # ===================================================================
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: twilio-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

  # ===================================================================
  # Messaging: RabbitMQ Configuration used when the system is running in RabbitMQ mode.
  # ===================================================================
  rabbitmq:
    addresses: ${SPRING_RABBITMQ_ADDRESSES:localhost:5672}


# ===================================================================
# Management & Monitoring (Actuator & Prometheus)
# ===================================================================
management:
  endpoints:
    web:
      exposure:
        # Exposing prometheus for metrics scraping along with standard health
        include: "health,info,prometheus"
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    # Explicitly enables the RabbitMQ health indicator
    rabbit:
      enabled: true
    kafka:
      enabled: true
  info:
    env:
      enabled: true
  # Prometheus Metrics Export Configuration
  metrics:
    tags:
      application: ${spring.application.name}
      group: sms-gateway-service

      
# ===================================================================
# Twilio Cloud API Credentials
# ===================================================================
twilio:
  account_sid: ${TWILIO_ACCOUNT_SID}
  auth_token: ${TWILIO_AUTH_TOKEN}
  from_number: ${TWILIO_FROM_NUMBER}

# ===================================================================
# Infrastructure Mapping define the specific destinations for both broker types.
# ===================================================================
smsmq:
  # RabbitMQ Specifics
  queuename: ${SMS_QUEUE_NAME:sms_queue}
  exchangename: ${SMS_EXCHANGE_NAME:sms_exchange}
  routingkey: ${SMS_ROUTING_KEY:rabbit_key}
  # Kafka Specifics
  topicname: ${KAFKA_SMS_TOPIC:dotmonsservice}
