# ============================================================================
# Config: Loki Configuration
# Description: High-performance log aggregation with TSDB storage and retention
# ============================================================================

# Multi-tenancy: Disabled for simple local/single-service setups
auth_enabled: false

server:
  http_listen_port: 3100
  log_level: info

# --- COMMON SETTINGS: Shared configurations for storage and internal coordination ---
common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# Governance: Define log limits and retention (7 days)
limits_config:
  retention_period: 168h
  allow_structured_metadata: true 
  reject_old_samples: true
  reject_old_samples_max_age: 168h

# Cleanup: Periodically deletes logs older than the retention period
compactor:
  working_directory: /loki/retention
  compaction_interval: 10m
  retention_enabled: true
  delete_request_store: filesystem
  retention_delete_delay: 2h
  retention_delete_worker_count: 150

# Database Schema: Uses the modern TSDB engine for faster queries and lower CPU
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Query Engine: Optimizes performance for Grafana dashboards
querier:
  max_concurrent: 10
