# ============================================================================
# Project: Kafka SMS Service
# Description: Consumes events from Kafka topics to trigger SMS notifications
# Documentation: https://spring.io
# ============================================================================

# ===================================================================
# Server Configuration
# ===================================================================
server:
  port: 8498

# ===================================================================
# Spring Core & Kafka Messaging Settings
# ===================================================================
spring:
  application:
    name: kafkasms
  
  kafka:
    # Uses environment variable for Docker network, defaults to localhost:29092 for local dev
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: sms-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      ack-mode: record    

# ===================================================================
# Eureka Discovery Client Settings
# ===================================================================
eureka:
  client:
    service-url:
      # Points to eureka-server:8761 in Docker, falls back to localhost for dev
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
    enabled: true

# ===================================================================
# Management & Monitoring (Actuator & Prometheus)
# ===================================================================
management:
  endpoints:
    web:
      exposure:
        # Exposing prometheus for metrics scraping along with standard health
        include: "health,info,prometheus"
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    # Monitor the connection status of the Kafka Broker
    kafka:
      enabled: true
  info:
    env:
      enabled: true
  # Prometheus Metrics Export Configuration
  metrics:
    tags:
      application: ${spring.application.name}
      group: kafka-service

# ===================================================================
# Kafka Custom Properties (SMS Integration)
# ===================================================================
kafkasms:
  topicbuilder: dotmonsservice
  groupid: dotmonskafka
  uri: http://TWILLOSMS/api/v1/smstwillo